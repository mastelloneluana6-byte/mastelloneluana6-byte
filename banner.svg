<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 200" width="850" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="50%" style="stop-color:#12081a"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff2d95"/>
      <stop offset="50%" style="stop-color:#c44cff"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="850" height="200" fill="url(#bg)" rx="24"/>
  <rect x="24" y="24" width="802" height="152" fill="none" stroke="url(#neon)" stroke-width="1" opacity="0.35" rx="20"/>
  <text x="425" y="95" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="42" font-weight="700" fill="url(#neon)" filter="url(#softGlow)">Luana Mastellone</text>
  <text x="425" y="138" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="12" fill="#a89bb8" letter-spacing="0.1em">SECURITY-FOCUSED FULL STACK · CUSTOM ENGINEERING · NO TEMPLATES</text>
  <circle cx="120" cy="100" r="3" fill="#ff2d95" opacity="0.9" filter="url(#glow)"/>
  <circle cx="730" cy="100" r="3" fill="#c44cff" opacity="0.9" filter="url(#glow)"/>
</svg>
