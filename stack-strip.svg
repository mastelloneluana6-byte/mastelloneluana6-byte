  <text x="256" y="53" text-anchor="middle" fill="#f5f3ff" font-family="system-ui, sans-serif" font-size="10" font-weight="600">JavaScript</text>
  <rect x="320" y="36" width="64" height="26" rx="8" fill="#12101c" stroke="url(#chip)" stroke-width="1.2"/>
  <text x="352" y="53" text-anchor="middle" fill="#f5f3ff" font-family="system-ui, sans-serif" font-size="10" font-weight="600">PHP</text>
  <rect x="392" y="36" width="72" height="26" rx="8" fill="#12101c" stroke="url(#chip)" stroke-width="1.2"/>
  <text x="428" y="53" text-anchor="middle" fill="#f5f3ff" font-family="system-ui, sans-serif" font-size="10" font-weight="600">MySQL</text>
  <rect x="472" y="36" width="88" height="26" rx="8" fill="#12101c" stroke="url(#chip)" stroke-width="1.2"/>
  <text x="516" y="53" text-anchor="middle" fill="#f5f3ff" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Tailwind</text>
  <rect x="568" y="36" width="112" height="26" rx="8" fill="#12101c" stroke="url(#chip)" stroke-width="1.2"/>
  <text x="624" y="53" text-anchor="middle" fill="#f5f3ff" font-family="system-ui, sans-serif" font-size="10" font-weight="600">WordPress</text>
  <rect x="688" y="36" width="88" height="26" rx="8" fill="#12101c" stroke="url(#chip)" stroke-width="1.2"/>
  <text x="732" y="53" text-anchor="middle" fill="#f5f3ff" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Shopify</text>
  <rect x="784" y="36" width="96" height="26" rx="8" fill="#12101c" stroke="url(#chip)" stroke-width="1.2"/>
  <text x="832" y="53" text-anchor="middle" fill="#f5f3ff" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Liquid</text>
