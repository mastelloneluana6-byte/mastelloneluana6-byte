<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 120" width="920" height="120">
  <defs>
    <linearGradient id="frame" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff2d95"/>
      <stop offset="50%" style="stop-color:#c44cff"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="chip" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff2d95"/>
      <stop offset="100%" style="stop-color:#c44cff"/>
    </linearGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="920" height="120" fill="#0a0a10" rx="20"/>
  <rect x="16" y="16" width="888" height="88" fill="none" stroke="url(#frame)" stroke-width="1" opacity="0.45" rx="16"/>
  <!-- row 1 -->
  <rect x="36" y="36" width="76" height="26" rx="8" fill="#12101c" stroke="url(#chip)" stroke-width="1.2"/>
  <text x="74" y="53" text-anchor="middle" fill="#f5f3ff" font-family="system-ui, sans-serif" font-size="10" font-weight="600">HTML</text>
  <rect x="120" y="36" width="72" height="26" rx="8" fill="#12101c" stroke="url(#chip)" stroke-width="1.2"/>
  <text x="156" y="53" text-anchor="middle" fill="#f5f3ff" font-family="system-ui, sans-serif" font-size="10" font-weight="600">CSS</text>
