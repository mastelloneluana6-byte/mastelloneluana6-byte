  <rect x="180" y="70" width="88" height="26" rx="8" fill="#12101c" stroke="url(#chip)" stroke-width="1.2"/>
  <text x="224" y="87" text-anchor="middle" fill="#f5f3ff" font-family="system-ui, sans-serif" font-size="10" font-weight="600">VS Code</text>
  <rect x="276" y="70" width="72" height="26" rx="8" fill="#12101c" stroke="url(#chip)" stroke-width="1.2"/>
  <text x="312" y="87" text-anchor="middle" fill="#f5f3ff" font-family="system-ui, sans-serif" font-size="10" font-weight="600">Sass</text>
